name: Build and Deploy Container to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login \
          ${{ secrets.ACR_LOGIN_SERVER }} \
          -u ${{ secrets.ACR_USERNAME }} \
          --password-stdin

      - name: Build de l'image Docker
        run: |
          docker build -t \
          ${{ secrets.ACR_LOGIN_SERVER }}/node-app:latest .

      - name: Push vers ACR
        run: |
          docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/node-app:latest

      - name: Déployer sur Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NOM }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/node-app:latest